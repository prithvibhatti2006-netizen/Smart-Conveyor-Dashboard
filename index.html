<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Conveyor Dashboard</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --metal-color: #ef4444; /* Red for metal */
      --plastic-color: #10b981; /* Green for plastic */
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

    body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }

    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; color: transparent; }
    header p { color: var(--text-muted); margin-top: 0.5rem; }

    .status-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(16, 185, 129, 0.1); color: var(--plastic-color); padding: 6px 12px; border-radius: 999px; font-size: 0.875rem; font-weight: 600; margin-top: 1rem; border: 1px solid rgba(16, 185, 129, 0.2); }
    .status-dot { width: 8px; height: 8px; background-color: var(--plastic-color); border-radius: 50%; animation: pulse 2s infinite; }

    .dashboard { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 800px; margin-bottom: 2rem; }

    .card { background-color: var(--card-bg); padding: 2rem; border-radius: 16px; width: 280px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.2s; }
    .card h2 { color: var(--text-muted); font-size: 1.25rem; font-weight: 500; margin-bottom: 1rem; }
    .count { font-size: 5rem; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .count.metal { color: var(--metal-color); }
    .count.plastic { color: var(--plastic-color); }

    .controls { background-color: var(--card-bg); padding: 1.5rem; border-radius: 12px; width: 100%; max-width: 800px; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; border: 1px dashed rgba(255, 255, 255, 0.1); }
    
    button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-metal { background-color: rgba(239, 68, 68, 0.1); color: var(--metal-color); border: 1px solid var(--metal-color); }
    .btn-metal:hover { background-color: var(--metal-color); color: white; }
    
    .btn-plastic { background-color: rgba(16, 185, 129, 0.1); color: var(--plastic-color); border: 1px solid var(--plastic-color); }
    .btn-plastic:hover { background-color: var(--plastic-color); color: white; }
    
    .btn-auto { background-color: var(--accent); color: white; border: 1px solid var(--accent); }
    .btn-auto:hover { background-color: #2563eb; }
    .btn-auto.active { background-color: transparent; border-color: var(--metal-color); color: var(--metal-color); }

    .activity-log { margin-top: 2rem; width: 100%; max-width: 800px; background-color: var(--card-bg); border-radius: 12px; padding: 1.5rem; }
    .activity-log h3 { color: var(--text-muted); margin-bottom: 1rem; font-size: 1.1rem; }
    .log-list { list-style: none; max-height: 200px; overflow-y: auto; padding-right: 10px; }
    .log-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-family: monospace; animation: slideIn 0.3s ease-out; }
    .log-item:first-child { color: white; font-weight: bold; }
    
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <header>
    <h1>Smart Conveyor System</h1>
    <p>Live Sorting & Diagnostics Dashboard</p>
    <div class="status-badge">
      <div class="status-dot"></div>
      System Online (Simulation Mode)
    </div>
  </header>

  <main>
    <div class="dashboard">
      <div class="card">
        <h2>Total Metal Detected</h2>
        <div class="count metal" id="metalDisplay">0</div>
      </div>
      <div class="card">
        <h2>Total Plastic Detected</h2>
        <div class="count plastic" id="plasticDisplay">0</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-metal" onclick="triggerDetection('metal')">Trigger Metal Sensor</button>
      <button class="btn-plastic" onclick="triggerDetection('plastic')">Trigger Ultrasonic Sensor</button>
      <button class="btn-auto" id="autoBtn" onclick="toggleAutoSim()">Start Auto-Simulation</button>
    </div>

    <div class="activity-log">
      <h3>Live Sensor Activity Log</h3>
      <ul class="log-list" id="logList">
        <li class="log-item" style="color: var(--text-muted)">Waiting for sensor input...</li>
      </ul>
    </div>
  </main>

  <script>
    // System State
    let state = { metal: 0, plastic: 0 };
    let autoSimInterval = null;

    // DOM Elements
    const elMetal = document.getElementById('metalDisplay');
    const elPlastic = document.getElementById('plasticDisplay');
    const elLog = document.getElementById('logList');
    const btnAuto = document.getElementById('autoBtn');

    // Function to handle a detection event
    function triggerDetection(type) {
      // Update state
      state[type]++;
      
      // Update UI
      const displayEl = type === 'metal' ? elMetal : elPlastic;
      displayEl.textContent = state[type];
      
      // Add a quick "pop" animation to the number
      displayEl.style.animation = 'none';
      displayEl.offsetHeight; // trigger reflow
      displayEl.style.animation = 'pop 0.3s ease-out';

      // Log the event
      addLogEntry(type);
    }

    // Function to add a visual log entry
    function addLogEntry(type) {
      const now = new Date();
      const timeString = now.toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits: 2 });
      
      const li = document.createElement('li');
      li.className = 'log-item';
      
      const itemSpan = document.createElement('span');
      itemSpan.textContent = type === 'metal' ? '⚙️ Inductive Prox: METAL' : '♻️ Ultrasonic Echo: PLASTIC';
      itemSpan.style.color = type === 'metal' ? 'var(--metal-color)' : 'var(--plastic-color)';
      
      const timeSpan = document.createElement('span');
      timeSpan.textContent = `[${timeString}]`;
      timeSpan.style.color = 'var(--text-muted)';

      li.appendChild(itemSpan);
      li.appendChild(timeSpan);

      // Remove the "Waiting..." placeholder if it exists
      if (elLog.children.length === 1 && elLog.children[0].textContent.includes("Waiting")) {
        elLog.innerHTML = '';
      }

      elLog.insertBefore(li, elLog.firstChild);

      // Keep log short to prevent memory bloat
      if (elLog.children.length > 50) {
        elLog.removeChild(elLog.lastChild);
      }
    }

    // Function to toggle automatic random simulation
    function toggleAutoSim() {
      if (autoSimInterval) {
        // Stop Simulation
        clearInterval(autoSimInterval);
        autoSimInterval = null;
        btnAuto.textContent = "Start Auto-Simulation";
        btnAuto.classList.remove("active");
      } else {
        // Start Simulation
        btnAuto.textContent = "Stop Auto-Simulation";
        btnAuto.classList.add("active");
        
        autoSimInterval = setInterval(() => {
          // Randomly pick metal (30% chance) or plastic (70% chance)
          const isMetal = Math.random() > 0.7; 
          triggerDetection(isMetal ? 'metal' : 'plastic');
        }, 2500); // Triggers every 2.5 seconds
      }
    }
  </script>
</body>
</html>
